name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # يشتغل كل يوم اتنين الساعة 6 صباحًا UTC، عشان يكتشف ثغرات جديدة
    # اتكشفت حتى لو الكود نفسه ما اتغيرش
    - cron: '0 6 * * 1'

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
